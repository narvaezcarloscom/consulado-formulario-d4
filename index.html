<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Formulario D4</title>
  <style>
    :root{
      --bg:#fff;
      --card:#fafafa;
      --line:#e6e6e6;
      --text:#111;
      --muted:#555;
      --blue:#0b66ff;
      --green:#1f9d55;
      --radius:14px;
    }
    *{box-sizing:border-box}
    body{font-family:Arial, sans-serif; max-width:980px; margin:24px auto; padding:0 16px; color:var(--text); background:var(--bg)}
    h1{font-size:20px; margin:0 0 14px}
    .section{border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin:14px 0; background:var(--card)}
    .section h2{font-size:14px; margin:0 0 10px}
    label{font-size:12px; color:#222; display:block; margin-bottom:6px}
    input, select{width:100%; padding:10px; border:1px solid #ccc; border-radius:10px; font-size:14px; background:#fff}
    input:focus, select:focus{outline:2px solid rgba(11,102,255,.15); border-color:#9dbfff}
    .grid{display:grid; grid-template-columns:repeat(3, 1fr); gap:12px}
    .grid2{display:grid; grid-template-columns:repeat(2, 1fr); gap:12px}
    .grid4{display:grid; grid-template-columns:repeat(4, 1fr); gap:12px}
    .row{margin:10px 0}
    .tight{max-width:220px}
    .tight2{max-width:320px}
    .pillRow{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end}
    .pill{
      border:1px solid #dcdcdc;
      background:#fff;
      border-radius:999px;
      padding:8px 12px;
      display:flex;
      gap:8px;
      align-items:center;
      cursor:pointer;
      user-select:none;
      min-height:38px;
    }
    .pill input{width:auto; padding:0; margin:0}
    .pill span{font-size:13px}
    .subtle{font-size:12px; color:var(--muted); margin-top:6px; line-height:1.35}
    .btns{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px}
    button{border:0; border-radius:12px; padding:10px 14px; font-size:14px; cursor:pointer}
    button.primary{background:var(--blue); color:#fff}
    button.secondary{background:var(--green); color:#fff}
    button.gray{background:#eee}
    .divider{height:1px; background:var(--line); margin:12px 0}
    @media (max-width:860px){
      .grid,.grid2,.grid4{grid-template-columns:1fr}
      .tight,.tight2{max-width:100%}
    }
  </style>
</head>
<body>
  <h1>Formulario D4</h1>

  <!-- PARA USO CONSULAR -->
  <div class="section">
    <h2>Para uso consular</h2>

    <div class="grid2">
      <div class="row tight">
        <label>Fecha (auto dd/mm/aa)</label>
        <input id="fecha" placeholder="dd/mm/aa">
      </div>
      <div class="row">
        <label>Misión</label>
        <input id="mision" value="ESTADO DE WASHINGTON">
      </div>
    </div>

    <div class="row">
      <label>Pago</label>
      <div class="pillRow">
        <!-- Grupo pasaporte (exclusivo) -->
        <label class="pill" title="Pasaporte 10 años">
          <input type="radio" name="pasaportePago" id="pago100" value="100">
          <span>$100</span>
        </label>
        <label class="pill" title="Pasaporte 5 años">
          <input type="radio" name="pasaportePago" id="pago65" value="65">
          <span>$65</span>
        </label>

        <!-- Check independientes -->
        <label class="pill" title="DPI">
          <input type="checkbox" id="pago15">
          <span>$15 (DPI)</span>
        </label>
        <label class="pill" title="Certificado">
          <input type="checkbox" id="pago6">
          <span>$6 (Certificado)</span>
        </label>
      </div>
    </div>

    <div class="row">
      <label>Estatus del pasaporte</label>
      <div class="pillRow">
        <label class="pill">
          <input type="radio" name="estatus" id="estatusNuevo" value="nuevo">
          <span>Nuevo</span>
        </label>
        <label class="pill">
          <input type="radio" name="estatus" id="estatusRenovar" value="renovar">
          <span>Renovación</span>
        </label>
        <label class="pill">
          <input type="radio" name="estatus" id="estatusReponer" value="reponer">
          <span>Reposición</span>
        </label>
      </div>
    </div>

    <div class="row">
      <label>Documento presentado</label>
      <div class="pillRow">
        <label class="pill">
          <input type="radio" name="docPresentado" id="docDpi" value="dpi">
          <span>DPI</span>
        </label>
        <label class="pill">
          <input type="radio" name="docPresentado" id="docCertificado" value="certificado">
          <span>Certificado</span>
        </label>
        <label class="pill">
          <input type="radio" name="docPresentado" id="docPasaporte" value="pasaporte">
          <span>Pasaporte</span>
        </label>
      </div>
    </div>

    <div class="grid2">
      <div class="row tight2">
        <label>CUI DPI (13 dígitos)</label>
        <input id="CuiDPI" inputmode="numeric" maxlength="13" placeholder="1234567890123">
      </div>
      <div class="row">
        <label>Lugar de emisión (Departamento / Municipio)</label>
        <input id="depMun" placeholder="Ej: Guatemala / Guatemala">
      </div>
    </div>
  </div>

  <!-- DATOS DEL SOLICITANTE -->
  <div class="section">
    <h2>Datos del solicitante</h2>

    <div class="grid">
      <div class="row">
        <label>Primer nombre</label>
        <input id="nombre1" autocomplete="given-name">
      </div>
      <div class="row">
        <label>Segundo nombre</label>
        <input id="nombre2">
      </div>
      <div class="row">
        <label>Tercer nombre</label>
        <input id="nombre3">
      </div>

      <div class="row">
        <label>Primer apellido</label>
        <input id="apellido1" autocomplete="family-name">
      </div>
      <div class="row">
        <label>Segundo apellido</label>
        <input id="apellido2">
      </div>
      <div class="row">
        <label>Apellido de casada</label>
        <input id="apellidoCasada">
      </div>
    </div>

    <div class="divider"></div>

    <!-- Lugar de nacimiento -->
    <div class="grid2">
      <div class="row">
        <label>Departamento (Lugar de nacimiento)</label>
        <input id="deptNac" list="listaDepartamentos" placeholder="Ej: Guatemala">
        <datalist id="listaDepartamentos"></datalist>
      </div>
      <div class="row">
        <label>Municipio (Lugar de nacimiento)</label>
        <input id="munNac" list="listaMunicipios" placeholder="Ej: Guatemala">
        <datalist id="listaMunicipios"></datalist>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Fecha de nacimiento + Edad -->
    <div class="grid4">
      <div class="row tight">
        <label>Fecha nacimiento - Día</label>
        <input id="nacDia" inputmode="numeric" maxlength="2" placeholder="DD">
      </div>
      <div class="row tight">
        <label>Fecha nacimiento - Mes</label>
        <input id="nacMes" inputmode="numeric" maxlength="2" placeholder="MM">
      </div>
      <div class="row tight">
        <label>Fecha nacimiento - Año</label>
        <input id="nacAnio" inputmode="numeric" maxlength="4" placeholder="AAAA">
      </div>
      <div class="row tight">
        <label>Edad (auto)</label>
        <input id="edad" inputmode="numeric" placeholder="Años">
      </div>
    </div>

    <div class="grid">
      <div class="row tight">
        <label>Estatura (cm)</label>
        <input id="estatura" inputmode="numeric" placeholder="cm">
      </div>
      <div class="row tight">
        <label>Peso (lb)</label>
        <input id="peso" inputmode="numeric" placeholder="lb">
      </div>
      <div class="row">
        <label>Ocupación</label>
        <input id="ocupacion" placeholder="ocupación">
      </div>
    </div>

    <div class="divider"></div>

    <div class="grid2">
      <div class="row">
        <label>Sexo</label>
        <div class="pillRow">
          <label class="pill"><input type="radio" name="sexo" id="sexoM" value="M"><span>M</span></label>
          <label class="pill"><input type="radio" name="sexo" id="sexoF" value="F"><span>F</span></label>
        </div>
      </div>

      <div class="row">
        <label>Estado civil</label>
        <div class="pillRow">
          <label class="pill"><input type="radio" name="estadoCivil" id="civilCasado" value="casado"><span>Casado(a)</span></label>
          <label class="pill"><input type="radio" name="estadoCivil" id="civilSoltero" value="soltero"><span>Soltero(a)</span></label>
        </div>
      </div>
    </div>

    <div class="row">
      <label>Etnia</label>
      <div class="pillRow">
        <label class="pill"><input type="radio" name="etnia" id="etniaMaya" value="maya"><span>Maya</span></label>
        <label class="pill"><input type="radio" name="etnia" id="etniaLadino" value="ladino"><span>Ladino/Mestizo</span></label>

        <div class="row tight2" style="margin:0">
          <label style="margin-bottom:6px">Idioma</label>
          <input id="idioma" list="listaIdiomas" placeholder="Ej: Español / K’iche’">
          <datalist id="listaIdiomas"></datalist>
        </div>
      </div>
    </div>
  </div>

  <!-- PADRES -->
  <div class="section">
    <h2>Padres</h2>
    <div class="grid2">
      <div class="row">
        <label>Padre</label>
        <input id="padre">
      </div>
      <div class="row">
        <label>Madre</label>
        <input id="madre">
      </div>
    </div>
  </div>

  <!-- TELÉFONOS -->
  <div class="section">
    <h2>Teléfonos</h2>
    <div class="grid2">
      <div class="row">
        <label>Teléfono celular</label>
        <input id="celularRes" inputmode="tel">
      </div>
      <div class="row">
        <label>Teléfono</label>
        <input id="telRes" inputmode="tel">
      </div>
    </div>
  </div>

  <!-- DIRECCIÓN (Envío / residencia según tu uso actual) -->
  <div class="section">
    <h2>Dirección</h2>

    <div class="grid2">
      <div class="row">
        <label>Dirección</label>
        <input id="dirEnv">
      </div>
      <div class="row tight">
        <label>APT#</label>
        <input id="aptEnv">
      </div>
    </div>

    <div class="grid">
      <div class="row">
        <label>Ciudad</label>
        <input id="ciudadEnv">
      </div>
      <div class="row">
        <label>Estado u otro</label>
        <input id="estadoEnv">
      </div>
    </div>

    <div class="row tight2">
      <label>Código postal</label>
      <input id="zipEnv" inputmode="numeric">
    </div>
  </div>

  <!-- AUTORIZACIÓN MENOR -->
  <div class="section">
    <h2>Autorización pasaporte (menor)</h2>
    <div class="grid2">
      <div class="row tight2">
        <label>Documento padre / tutor</label>
        <input id="documentoPadre">
      </div>
      <div class="row tight2">
        <label>Documento madre / tutor</label>
        <input id="documentoMadre">
      </div>
    </div>
  </div>

  <!-- OBSERVACIONES -->
  <div class="section">
    <h2>Observaciones</h2>
    <div class="row">
      <label>Línea 1</label>
      <input id="obs1" placeholder="MENOR DE EDAD">
    </div>
    <div class="row">
      <label>Línea 2</label>
      <input id="obs2">
    </div>
  </div>

  <!-- BOTONES -->
  <div class="btns">
    <button class="gray" type="button" id="btnListar">Ver nombres de campos del PDF (consola)</button>
    <button class="secondary" type="button" id="btnNuevo">Nuevo</button>
    <button class="primary" type="button" id="btnGenerar">Generar PDF (abre pestaña)</button>
  </div>

  <div class="subtle" style="margin-top:10px">
    Impresión: en la pestaña del PDF usa <b>Letter</b> y <b>Scale 100% / Actual size</b> (sin “Fit to page”).
  </div>

  <!-- pdf-lib -->
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

  <!-- Tu dataset de municipios -->
<script src="./municipios.js?v=1"></script>
  <!-- app (cache-buster para Hostinger) -->
  <script src="./app.js?v=20260304-1"></script>
</body>
</html>
